server:
  port: 8081
  servlet:
    session:
      cookie:
        name: mmwikissid
      timeout: 20h

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mm_wiki?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&sslMode=DISABLED
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123654
    hikari:
      minimum-idle: 10
      maximum-pool-size: 15
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  session:
    store-type: jdbc
    timeout: 1800s
    jdbc:
      initialize-schema: never

mmwiki:
  document-root-dir: ./data
