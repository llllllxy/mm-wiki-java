<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1 , user-scalable=no">
    <title>MM-Wiki</title>
    <link type="favicon" rel="shortcut icon" th:href="@{/static/images/favicon.ico}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/static/plugins/bootstrap/css/bootstrap.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/plugins/bootstrap-table/bootstrap-table.min.css}">
    <link type="text/css" rel="stylesheet"
          th:href="@{/static/plugins/bootstrap-table/extensions/page-jump/bootstrap-table-pagejump.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/font-awesome/css/font-awesome.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/css/common.css}">
    <script type="text/javascript" th:src="@{/static/plugins/jquery/jquery1.11.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap/js/bootstrap.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap-table/bootstrap-table.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap-table/bootstrap-table-zh-CN.min.js}"></script>
    <script type="text/javascript"
            th:src="@{/static/plugins/bootstrap-table/extensions/page-jump/bootstrap-table-pagejump.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/layer/layer.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/layers.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/ajax.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/common.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/table.js}"></script>
</head>
<body id="frame-body">
<div class="container-fluid">
    <div class="panel panel-default">
        <div class="panel-body">
            <div class="page-header">
                <h2>空间标签 <small style="font-size: 12px"><span class="label label-default"
                                                                  th:text="${tag}">tag</span></small> <small><span
                        id="spaceCount" class="badge">0</span></small></h2>
            </div>
            <div id="emptySpaceAlert" class="alert alert-info alert-dismissible fade in hide" role="alert"
                 style="margin-bottom: 10px">
                <p><i class="glyphicon glyphicon-volume-up"></i> 没有搜索到该标签下的空间！</p>
            </div>
            <table id="spaceTable"></table>
        </div>
    </div>
</div>
<script type="text/javascript" th:inline="javascript">
    var currentTag = /*[[${tag}]]*/ "";

    function nameFormatter(value, row) {
        return '<a href="/space/document?space_id=' + row.spaceId + '" target="_parent" title="查看空间文档"><strong>' + tableHtml(value) + '</strong> <span class="text text-primary"><i class="glyphicon glyphicon-new-window"></i></span></a>';
    }

    function visitFormatter(value) {
        if (value === "private") {
            return tableText("Private", "text text-danger");
        }
        if (value === "internal") {
            return tableText("Internal", "text text-warning");
        }
        return tableText("Public", "text text-primary");
    }

    function actionFormatter(value, row) {
        var collectUrl = row.collection
            ? "/collection/cancel?collection_id=" + row.collectionId
            : "/collection/add?type=2&resource_id=" + row.spaceId;
        var collectIcon = row.collection ? "glyphicon-star" : "glyphicon-star-empty";
        return '<div class="btn-group btn-group-sm" role="group">' +
            '<a data-url="' + collectUrl + '" onclick="Common.ajaxSubmit(this.getAttribute(\'data-url\'))" type="button" class="btn btn-default"><i class="glyphicon ' + collectIcon + '"> </i></a>' +
            '<a name="user" data-link="/space/member?space_id=' + row.spaceId + '" type="button" class="btn btn-default"><i class="fa fa-group"></i></a>' +
            '</div>';
    }

    $(function () {
        initTable({
            domId: "spaceTable",
            url: "/space/search",
            uniqueId: "spaceId",
            sortable: false,
            pageSize: 20,
            pageList: [10, 20, 50, 100],
            queryParams: function () {
                return {tag: currentTag};
            },
            columns: [
                {field: "name", title: "名称", width: "15%", formatter: nameFormatter},
                {field: "description", title: "描述"},
                {field: "tags", title: "标签", width: "15%", formatter: tableTags},
                {field: "visitLevel", title: "访问级别", width: "15%", align: "center", formatter: visitFormatter},
                {field: "createDateText", title: "创建时间", width: "13%", align: "center"},
                {field: "operate", title: "操作", width: "13%", align: "center", formatter: actionFormatter}
            ],
            onLoadSuccess: function (data) {
                $("#spaceCount").text(data.total || 0);
                $("#emptySpaceAlert").toggleClass("hide", (data.total || 0) > 0);
                Layers.bindIframe("[name='user']", "空间成员列表", "500px", "1000px");
            }
        });
    });
</script>
</body>
</html>
