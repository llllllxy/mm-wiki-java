<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1 , user-scalable=no">
    <title>MM-Wiki</title>
    <link type="favicon" rel="shortcut icon" th:href="@{/static/images/favicon.ico}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/static/plugins/bootstrap/css/bootstrap.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/font-awesome/css/font-awesome.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/css/common.css}">
    <script type="text/javascript" th:src="@{/static/plugins/jquery/jquery1.11.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap/js/bootstrap.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/layui/layer/layer.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/common.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/layers.js}"></script>
</head>
<body id="frame-body">
<div class="container-fluid">
    <div class="panel panel-default">
        <div class="panel-body">
            <div class="page-header">
                <h2>收藏空间 <small><span class="badge" th:text="${count}">0</span></small></h2>
            </div>
            <div th:if="${count == 0}" class="alert alert-info alert-dismissible fade in" role="alert" style="margin-bottom: 0">
                <p><i class="glyphicon glyphicon-volume-up"></i> 您还没有收藏任何空间！</p>
            </div>
            <table th:if="${count > 0}" class="table" style="margin-bottom: 0">
                <thead>
                <tr>
                    <td class="w15p text-left"><strong>名称</strong></td>
                    <td class="text-left"><strong>描述</strong></td>
                    <td class="w15p text-left"><strong>标签</strong></td>
                    <td class="w15p center"><strong>访问级别</strong></td>
                    <td class="w13p center"><strong>创建时间</strong></td>
                    <td class="w13p center"><strong>操作</strong></td>
                </tr>
                </thead>
                <tbody>
                <tr class="space-list" th:each="space : ${spaces}">
                    <td><a th:href="@{/space/document(space_id=${space.spaceId})}" target="_parent"><strong th:text="${space.name}">空间</strong> <span class="text text-primary"><i class="glyphicon glyphicon-new-window"></i></span></a></td>
                    <td th:text="${space.description}">描述</td>
                    <td class="tags-show" th:text="${space.tags}">tag</td>
                    <td class="center">
                        <label class="text text-danger" th:if="${space.visitLevel == 'private'}">Private</label>
                        <label class="text text-warning" th:if="${space.visitLevel == 'internal'}">Internal</label>
                        <label class="text text-primary" th:if="${space.visitLevel != 'private' and space.visitLevel != 'internal'}">Public</label>
                    </td>
                    <td class="center" th:text="${space.createDateText}">2026-05-06</td>
                    <td class="center">
                        <div class="btn-group btn-group-sm" role="group">
                            <a name="collection_space"
                               th:data-url="@{/collection/cancel(collection_id=${space.collectionId})}"
                               onclick="Common.ajaxSubmit(this.getAttribute('data-url'))" type="button"
                               class="btn btn-default"><i class="glyphicon glyphicon-star"> </i></a>
                            <a name="user" th:data-link="@{/space/member(space_id=${space.spaceId})}" type="button"
                               class="btn btn-default"><i class="fa fa-group"></i></a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(function () {
        $(".tags-show").each(function () {
            var tags = $(this).text();
            if (tags !== "") {
                var html = "";
                var tagList = tags.split(",");
                for (var i = 0; i < tagList.length; i++) {
                    html += "<span class='label label-default'>" + tagList[i] + "</span> ";
                }
                $(this).html(html);
            }
        });
    });
    Layers.bindIframe("[name='user']", "空间成员列表", "500px", "1000px");
</script>
</body>
</html>
