<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1 , user-scalable=no">
    <title>MM-Wiki</title>
    <link type="favicon" rel="shortcut icon" th:href="@{/static/images/favicon.ico}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/static/plugins/bootstrap/css/bootstrap.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/font-awesome/css/font-awesome.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/css/common.css}">
    <script type="text/javascript" th:src="@{/static/plugins/jquery/jquery1.11.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap/js/bootstrap.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/common.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/layers.js}"></script>
</head>
<body id="frame-body">
<div class="container-fluid">
    <div class="panel panel-default">
        <div class="panel-body">
            <div class="page-header">
                <h3><i class="fa fa-address-card-o"></i> <span th:text="${user.username + '（' + user.givenName + '）'}">用户</span></h3>
            </div>
            <ul class="nav nav-tabs">
                <li><a href="/system/profile/info">用户信息</a></li>
                <li><a href="/system/profile/followUser">关注用户</a></li>
                <li class="active"><a href="/system/profile/followDoc">关注文档</a></li>
            </ul>
            <br>
            <div class="alert alert-info alert-dismissible fade in" role="alert" style="margin-bottom: 10px">
                <p><i class="glyphicon glyphicon-volume-up"></i>
                    <span th:if="${autoFollowDoc == '1'}">你创建、编辑过的文档会自动设置为关注。</span>
                    当关注文档更新时会发送邮件通知，点击 <i class="glyphicon glyphicon-remove-circle"></i> 可移除。
                </p>
            </div>
            <div th:if="${count == 0}" class="alert alert-info alert-dismissible fade in" role="alert" style="margin-bottom: 0">
                <p><i class="glyphicon glyphicon-volume-up"></i> 还没有关注任何文档。</p>
            </div>
            <table th:if="${count > 0}" class="table">
                <tbody>
                <tr th:each="item : ${followDocuments}">
                    <td>
                        <strong>
                            <a th:href="@{/document/index(document_id=${item.document.documentId})}" target="_parent">
                                <i class="fa fa-file-o"></i>
                                <span th:text="${item.document.name}">文档</span>
                            </a>
                        </strong>
                        <span class="text-font-10" style="color: #8e8e8e;">（最后更新于 <span th:text="${item.updateTimeText}">2026-01-01 00:00:00</span>）</span>
                    </td>
                    <td class="w5p center">
                        <a th:data-url="@{/follow/cancel(follow_id=${item.followId},redirect='/system/profile/followDoc')}"
                           onclick="Common.ajaxSubmit(this.getAttribute('data-url'))" title="移除关注"><i
                                class="glyphicon glyphicon-remove-circle"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="center" style="margin-top: 5px" th:if="${paginator != null and paginator.nums > 0}">
                <ul class="pagination pagination-sm">
                    <li><span>共 <span th:text="${paginator.nums}">0</span> 条数据</span></li>
                    <li th:each="pageItem : ${paginator.pages}" th:classappend="${pageItem.active} ? 'active'">
                        <a th:href="${pageItem.url}" th:text="${pageItem.page}">1</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
</body>
</html>
