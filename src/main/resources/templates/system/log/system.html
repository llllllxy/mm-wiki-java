<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1 , user-scalable=no">
    <title>MM-Wiki</title>
    <link type="favicon" rel="shortcut icon" th:href="@{/static/images/favicon.ico}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/static/plugins/bootstrap/css/bootstrap.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/plugins/bootstrap-table/bootstrap-table.min.css}">
    <link type="text/css" rel="stylesheet"
          th:href="@{/static/plugins/bootstrap-table/extensions/page-jump/bootstrap-table-pagejump.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/css/common.css}">
    <script type="text/javascript" th:src="@{/static/plugins/jquery/jquery1.11.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap/js/bootstrap.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap-table/bootstrap-table.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap-table/bootstrap-table-zh-CN.min.js}"></script>
    <script type="text/javascript"
            th:src="@{/static/plugins/bootstrap-table/extensions/page-jump/bootstrap-table-pagejump.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/layui/layer/layer.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/common.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/layers.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/ajax.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/table.js}"></script>
</head>
<body id="frame-body">
<div class="container-fluid">
    <div class="panel panel-default">
        <div class="panel-body">
            <div class="row">
                <form id="systemLogSearchForm" role="form">
                    <div class="col-md-3"></div>
                    <div class="col-md-3">
                        <div class="input-group">
                            <span class="input-group-addon">日志级别</span>
                            <select id="level" class="form-control" name="level">
                                <option value="">全部</option>
                                <option value="7" th:selected="${level == 7}">DEBUG</option>
                                <option value="6" th:selected="${level == 6}">INFO</option>
                                <option value="4" th:selected="${level == 4}">WARNING</option>
                                <option value="3" th:selected="${level == 3}">ERROR</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="input-group">
                            <span class="input-group-addon">用户名</span>
                            <input id="username" class="form-control" name="username" type="text" th:value="${username}"
                                   placeholder="用户名">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="input-group">
                            <input id="message" class="form-control" name="message" type="text" th:value="${message}"
                                   placeholder="描述">
                            <span class="input-group-btn">
                                <button type="button" class="btn btn-primary" onclick="reloadTable()"><i
                                        class="glyphicon glyphicon-search"></i></button>
                                <button type="button" class="btn btn-warning" onclick="resetSearchForm()"><i
                                        class="glyphicon glyphicon-repeat"></i></button>
                            </span>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="panel-body" style="padding-top: 0">
            <table id="systemLogTable"></table>
        </div>
    </div>
</div>
<script type="text/javascript" th:inline="javascript">
    AjaxUtil.ctx = /*[[@{/}]]*/ "";
    var systemLogInfoUrl = /*[[@{/system/log/info}]]*/ "";

    function htmlEncode(value) {
        return $("<div/>").text(value == null ? "" : value).html();
    }

    function levelFormatter(value, row) {
        var labelClass = row.levelCss || "label-default";
        var labelText = row.levelText || value || "";
        return '<span class="label ' + labelClass + '">' + htmlEncode(labelText) + '</span>';
    }

    function messageFormatter(value, row) {
        return '<a type="button" onclick="detail(\'' + row.logId + '\')">' + htmlEncode(value) + '</a>';
    }

    $(function () {
        var options = {
            domId: "systemLogTable",
            url: AjaxUtil.ctx + "system/log/system/list",
            uniqueId: "logId",
            sortable: false,
            sortName: "logId",
            sortOrder: "desc",
            pageSize: 10,
            pageList: [10, 20, 50, 100],
            queryParams: function (params) {
                return {
                    level: $("#level").val(),
                    username: $("#username").val(),
                    message: $("#message").val()
                };
            },
            columns: [
                {field: "logId", title: "ID", width: "7%", align: "center"},
                {field: "level", title: "级别", width: "10%", align: "center", formatter: levelFormatter},
                {field: "username", title: "用户", width: "9%", align: "center"},
                {field: "message", title: "描述", formatter: messageFormatter},
                {field: "path", title: "动作", width: "20%"},
                {field: "ip", title: "IP", width: "10%", align: "center"},
                {field: "createTimeText", title: "时间", width: "15%", align: "center"}
            ]
        };

        initTable(options);

    });

    function detail(logId) {
        layer.open({
            type: 2,
            skin: Layers.skin,
            title: "<strong>日志详细信息</strong>",
            shadeClose: true,
            shade: 0.6,
            maxmin: true,
            area: ["800px", "400px"],
            content: systemLogInfoUrl + "?log_id=" + logId,
            padding: "10px"
        });
    }

    function reloadTable() {
        $("#systemLogTable").bootstrapTable("refreshOptions", {pageNumber: 1});
    }

    function resetSearchForm() {
        $("#systemLogSearchForm")[0].reset();
        reloadTable();
    }
</script>
</body>
</html>
