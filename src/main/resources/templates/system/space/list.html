<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1 , user-scalable=no">
    <title>MM-Wiki</title>
    <link type="favicon" rel="shortcut icon" href="/static/images/favicon.ico" />
    <link type="text/css" rel="stylesheet" href="/static/plugins/bootstrap/css/bootstrap.min.css">
    <link type="text/css" rel="stylesheet" href="/static/css/common.css">
    <script type="text/javascript" src="/static/plugins/jquery/jquery1.11.js"></script>
    <script type="text/javascript" src="/static/plugins/bootstrap/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="/static/plugins/layui/layer/layer.js"></script>
    <script type="text/javascript" src="/static/js/common/common.js"></script>
    <script type="text/javascript" src="/static/js/common/layers.js"></script>
</head>
<body id="frame-body">
<div class="container-fluid">
    <div class="panel panel-default">
        <div class="panel-body">
            <div class="row">
                <form action="" method="get">
                    <div class="col-md-3">
                        <a class="btn btn-success" href="/system/space/add"><i class="glyphicon glyphicon-plus"></i> 添加空间</a>
                    </div>
                    <div class="col-md-3 col-md-offset-6">
                        <div class="input-group">
                            <input class="form-control" name="keyword" type="text" th:value="${keyword}" placeholder="空间名称 / 描述">
                            <span class="input-group-btn">
                                <button type="submit" class="btn btn-primary"><i class="glyphicon glyphicon-search"></i></button>
                            </span>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered">
                <thead>
                <tr>
                    <th class="w8p">ID</th>
                    <th class="w15p">名称</th>
                    <th>描述</th>
                    <th class="w15p">标签</th>
                    <th class="w8p">访问级别</th>
                    <th class="w8p">分享</th>
                    <th class="w8p">导出</th>
                    <th class="w22p">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="space : ${spaces}">
                    <td class="center" th:text="${space.spaceId}">1</td>
                    <td>
                        <a th:href="@{/space/document(space_id=${space.spaceId})}" target="_parent" title="查看空间文档">
                            <strong th:text="${space.name}">空间</strong>
                            <span class="text text-primary"><i class="glyphicon glyphicon-new-window"></i></span>
                        </a>
                    </td>
                    <td th:text="${space.description}">描述</td>
                    <td class="tags-show center" th:text="${space.tags}">标签</td>
                    <td class="center">
                        <label class="text text-danger" th:if="${space.visitLevel == 'private'}">Private</label>
                        <label class="text text-primary" th:if="${space.visitLevel != 'private'}">Public</label>
                    </td>
                    <td class="center">
                        <span class="label label-success" th:if="${space.isShare == 1}">是</span>
                        <span class="label label-danger" th:if="${space.isShare != 1}">否</span>
                    </td>
                    <td class="center">
                        <span class="label label-success" th:if="${space.isExport == 1}">是</span>
                        <span class="label label-danger" th:if="${space.isExport != 1}">否</span>
                    </td>
                    <td class="center">
                        <a name="user" th:attr="data-link=@{/system/space/member(space_id=${space.spaceId})}"><i class="fa fa-group"></i> 成员</a>
                        <a th:href="@{/system/space/edit(space_id=${space.spaceId})}"><i class="glyphicon glyphicon-edit"></i> 编辑</a>
                        <a th:href="@{/system/space/download(space_id=${space.spaceId})}"><i class="glyphicon glyphicon-download-alt"></i> 下载</a>
                        <a th:onclick="|Layers.confirm('确定删除该空间吗？删除前请确认已经备份。', '/system/space/delete?space_id=${space.spaceId}');|"><i class="glyphicon glyphicon-remove"></i> 删除</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="panel-footer" th:if="${paginator != null and paginator.nums > 0}">
            <ul class="pagination pagination-sm">
                <li><span>共 <span th:text="${paginator.nums}">0</span> 条数据</span></li>
                <li th:each="pageItem : ${paginator.pages}" th:classappend="${pageItem.active} ? 'active'">
                    <a th:href="${pageItem.url}" th:text="${pageItem.page}">1</a>
                </li>
            </ul>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(function () {
        $(".tags-show").each(function () {
            var tags = $(this).text();
            if (tags !== "") {
                var html = "";
                var tagList = tags.split(",");
                for (var i = 0; i < tagList.length; i++) {
                    if (tagList[i].trim() !== "") {
                        html += "<span class='label label-default'>" + tagList[i].trim() + "</span> ";
                    }
                }
                $(this).html(html);
            }
        });
    });
    Layers.bindIframe("[name='user']", "空间成员列表", "500px", "1000px");
</script>
</body>
</html>
