<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1 , user-scalable=no">
    <title>MM-Wiki</title>
    <link type="favicon" rel="shortcut icon" href="/static/images/favicon.ico" />
    <link type="text/css" rel="stylesheet" href="/static/plugins/bootstrap/css/bootstrap.min.css">
    <link type="text/css" rel="stylesheet" href="/static/plugins/bootstrap-select/css/bootstrap-select.min.css">
    <link type="text/css" rel="stylesheet" href="/static/css/common.css">
    <script type="text/javascript" src="/static/plugins/jquery/jquery1.11.js"></script>
    <script type="text/javascript" src="/static/plugins/jquery/jquery.form.js"></script>
    <script type="text/javascript" src="/static/plugins/bootstrap/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="/static/plugins/bootstrap-select/js/bootstrap-select.min.js"></script>
    <script type="text/javascript" src="/static/plugins/bootstrap-select/js/i18n/defaults-zh_CN.min.js"></script>
    <script type="text/javascript" src="/static/plugins/layui/layer/layer.js"></script>
    <script type="text/javascript" src="/static/js/common/common.js"></script>
    <script type="text/javascript" src="/static/js/common/form.js"></script>
    <script type="text/javascript" src="/static/js/common/layers.js"></script>
</head>
<body id="frame-body">
<div class="container-fluid">
    <div id="failedBox" class="hide"></div>
    <div class="panel panel-default">
        <div class="panel-body">
            <div class="row">
                <form action="/system/space_user/save" method="post">
                    <div class="col-md-3">
                        <div class="input-group">
                            <span class="input-group-addon">空间权限</span>
                            <select name="privilege" class="form-control selectpicker show-menu-arrow" data-max-options="1">
                                <option value="0">浏览者</option>
                                <option value="1">编辑者</option>
                                <option value="2">管理员</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <select name="user_id" class="form-control selectpicker show-menu-arrow" multiple data-live-search="true" data-max-options="1" title="选择要添加的成员">
                                <option th:each="otherUser : ${otherUsers}" th:value="${otherUser.userId}" th:text="${otherUser.username + '(' + otherUser.givenName + ')'}">用户</option>
                            </select>
                            <input type="hidden" name="space_id" th:value="${space_id}">
                            <span class="input-group-btn">
                                <button type="button" class="btn btn-primary" onclick="Form.ajaxSubmit(this.form, false);"><i class="glyphicon glyphicon-plus"></i> 添加</button>
                            </span>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered">
                <thead>
                <tr>
                    <th class="w8p">ID</th>
                    <th class="w15p">用户名</th>
                    <th>姓名</th>
                    <th class="w20p">邮箱</th>
                    <th class="w15p">空间权限</th>
                    <th class="w13p">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="member : ${users}">
                    <td class="center" th:text="${member.user.userId}">1</td>
                    <td th:text="${member.user.username}">user</td>
                    <td th:text="${member.user.givenName}">name</td>
                    <td th:text="${member.user.email}">email</td>
                    <td class="center" style="padding: 4px 6px">
                        <select name="edit_privilege" class="form-control input-xs"
                                th:attr="data-link=@{/system/space_user/modify(space_id=${space_id},space_user_id=${member.spaceUserId})}">
                            <option value="0" th:selected="${member.privilege == 0}">浏览者</option>
                            <option value="1" th:selected="${member.privilege == 1}">编辑者</option>
                            <option value="2" th:selected="${member.privilege == 2}">管理员</option>
                        </select>
                    </td>
                    <td class="center">
                        <a data-message="确定要移除该成员吗？"
                           th:data-url="|/system/space_user/remove?space_user_id=${member.spaceUserId}&amp;space_id=${space_id}&amp;user_id=${member.user.userId}|"
                           onclick="Layers.confirm(this.getAttribute('data-message'), this.getAttribute('data-url'))">
                            <i class="glyphicon glyphicon-remove-circle"></i>移除
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="panel-footer" th:if="${paginator != null and paginator.nums > 0}">
            <ul class="pagination pagination-sm">
                <li><span>共 <span th:text="${paginator.nums}">0</span> 条数据</span></li>
                <li th:each="pageItem : ${paginator.pages}" th:classappend="${pageItem.active} ? 'active'">
                    <a th:href="${pageItem.url}" th:text="${pageItem.page}">1</a>
                </li>
            </ul>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(function () {
        $("select[name='edit_privilege']").each(function () {
            $(this).bind('change', function () {
                var url = $(this).attr("data-link");
                var privilege = this.value;
                Common.ajaxSubmit(url + "&privilege=" + privilege);
            });
        });
    });
</script>
</body>
</html>
