<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1 , user-scalable=no">
    <title>MM-Wiki</title>
    <link type="favicon" rel="shortcut icon" th:href="@{/static/images/favicon.ico}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/static/plugins/bootstrap/css/bootstrap.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/plugins/bootstrap-table/bootstrap-table.min.css}">
    <link type="text/css" rel="stylesheet"
          th:href="@{/static/plugins/bootstrap-table/extensions/page-jump/bootstrap-table-pagejump.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/css/common.css}">
    <script type="text/javascript" th:src="@{/static/plugins/jquery/jquery1.11.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap/js/bootstrap.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap-table/bootstrap-table.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap-table/bootstrap-table-zh-CN.min.js}"></script>
    <script type="text/javascript"
            th:src="@{/static/plugins/bootstrap-table/extensions/page-jump/bootstrap-table-pagejump.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/layui/layer/layer.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/common.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/layers.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/ajax.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/table.js}"></script>
</head>
<body id="frame-body">
<div class="container-fluid">
    <div class="panel panel-default">
        <div class="panel-body">
            <div class="row">
                <form id="contactImportSearchForm" role="form">
                    <div class="col-sm-offset-8 col-sm-4">
                        <div class="input-group">
                            <input id="username" class="form-control" name="username" type="text" th:value="${username}"
                                   placeholder="用户名">
                            <span class="input-group-btn">
                                <button type="button" class="btn btn-primary" onclick="reloadTable()"><i
                                        class="glyphicon glyphicon-search"></i></button>
                                <button type="button" class="btn btn-warning" onclick="resetSearchForm()"><i
                                        class="glyphicon glyphicon-repeat"></i></button>
                            </span>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="panel-body" style="padding-top: 0">
            <table id="contactImportTable"></table>
        </div>
    </div>
</div>
<script type="text/javascript" th:inline="javascript">
    AjaxUtil.ctx = /*[[@{/}]]*/ "";

    function actionFormatter(value, row) {
        if (row.isForbidden === 1) {
            return "";
        }
        var params = $.param({
            name: row.givenName || "",
            mobile: row.mobile || "",
            position: row.position || "",
            email: row.email || ""
        });
        return '<a data-message="确定导入该用户为系统联系人吗？" data-url="' + AjaxUtil.ctx + 'system/contact/save" data-params="' + tableHtml(params) + '" onclick="importContact(this.getAttribute(\'data-message\'), this.getAttribute(\'data-url\'), this.getAttribute(\'data-params\'))"><i class="glyphicon glyphicon-import"></i>导入</a>';
    }

    $(function () {
        initTable({
            domId: "contactImportTable",
            url: AjaxUtil.ctx + "system/contact/import",
            uniqueId: "userId",
            sortable: false,
            pageSize: 20,
            pageList: [10, 20, 50, 100],
            queryParams: function () {
                return {username: $("#username").val()};
            },
            columns: [
                {field: "userId", title: "ID", width: "8%", align: "center"},
                {field: "username", title: "用户名", width: "13%"},
                {field: "givenName", title: "姓名", width: "13%"},
                {field: "position", title: "职位"},
                {field: "mobile", title: "手机号", width: "15%", align: "center"},
                {field: "email", title: "邮箱", width: "20%"},
                {field: "operate", title: "操作", width: "11%", align: "center", formatter: actionFormatter}
            ]
        });
    });

    function reloadTable() {
        reloadTableFirstPage("contactImportTable");
    }

    function resetSearchForm() {
        resetTableSearch("contactImportSearchForm", "contactImportTable");
    }

    function importContact(title, url, data) {
        Layers.confirmCallback(title, function () {
            Common.ajaxSubmitCallback(url, data, function (response) {
                if (response.code === 0) {
                    Layers.failedMsg(response.message, function () {});
                    return;
                }
                Layers.successMsg(response.message, function () {
                    parent.location.href = response.redirect.url;
                });
            }, function () {});
        }, function () {});
    }
</script>
</body>
</html>
