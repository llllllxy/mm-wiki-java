<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1 , user-scalable=no">
    <title>MM-Wiki</title>
    <link type="favicon" rel="shortcut icon" th:href="@{/static/images/favicon.ico}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/static/plugins/bootstrap/css/bootstrap.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/plugins/bootstrap-switch/css/bootstrap-switch.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/font-awesome/css/font-awesome.min.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/static/css/common.css}">
    <script type="text/javascript" th:src="@{/static/plugins/jquery/jquery1.11.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap/js/bootstrap.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/bootstrap-switch/js/bootstrap-switch.min.js}"></script>
    <script type="text/javascript" th:src="@{/static/plugins/layui/layer/layer.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/common.js}"></script>
    <script type="text/javascript" th:src="@{/static/js/common/layers.js}"></script>
</head>
<body id="frame-body">
<div class="container-fluid">
    <div class="panel panel-default">
        <div class="panel-body">
            <div class="row">
                <form action="" method="get">
                    <div class="col-md-offset-9 col-md-3">
                        <div class="input-group">
                            <input class="form-control" name="keyword" type="text" th:value="${keyword}" placeholder="插件名称">
                            <span class="input-group-btn">
                                <button type="submit" class="btn btn-primary"><i class="glyphicon glyphicon-search"></i></button>
                            </span>
                        </div>
                    </div>
                </form>
            </div>
            <hr style="margin-bottom: 0">
        </div>
        <div class="panel-body">
            <div class="alert alert-info" th:if="${#lists.isEmpty(plugins)}">当前初始化脚本未包含插件数据。</div>
            <div class="row">
                <div class="col-sm-6 col-md-3" th:each="plugin : ${plugins}">
                    <div class="thumbnail">
                        <img th:src="${plugin.coverUrl}" style="height: 150px; width: 100%;border-bottom: 1px solid #ddd" alt="">
                        <div class="caption">
                            <h3 class="center" style="margin-top: 10px" th:text="${plugin.title}">插件</h3>
                            <p style="height: 80px; overflow-y: auto" th:text="${plugin.description}">描述</p>
                            <div style="height: 30px">
                                <span style="float: left;">
                                    <a name="config"
                                       th:data-link="@{/system/plugin/config(plugin_id=${plugin.pluginId})}"
                                       class="btn btn-sm btn-default" role="button">
                                        <i class="fa fa-wrench"></i> 配置
                                    </a>
                                </span>
                                <span style="float: right;"><input type="checkbox" value="1"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${paginator != null and paginator.nums > 0}">
                <ul class="pagination pagination-sm">
                    <li><span>共 <span th:text="${paginator.nums}">0</span> 条数据</span></li>
                    <li th:each="pageItem : ${paginator.pages}" th:classappend="${pageItem.active} ? 'active'">
                        <a th:href="${pageItem.url}" th:text="${pageItem.page}">1</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(function () {
        $("input[type='checkbox']").bootstrapSwitch({size: 'small', onText: '开', offText: '关'});
    });
    Layers.bindIframe("[name='config']", "插件配置", "600px", "1100px");
</script>
</body>
</html>
