<th:block th:fragment="default(paginator)" th:if="${paginator != null and paginator.nums > 0}">
    <ul class="pagination pagination-sm">
        <li><span>共 <span th:text="${paginator.nums}">0</span> 条数据</span></li>
        <li class="pagination-select">
            <span>
                <select class="pagination-select-xs" onchange="window.location=this.value">
                    <option th:each="option : ${paginator.perPageOptions}"
                            th:value="${option.url}"
                            th:selected="${option.selected}"
                            th:text="${option.value + '条/页'}">20条/页</option>
                </select>
            </span>
        </li>
        <li th:if="${paginator.hasPrev}"><a th:href="${paginator.pageLinkFirst}">首页</a></li>
        <li th:if="${paginator.hasPrev}"><a th:href="${paginator.pageLinkPrev}"><span><i
                class="glyphicon glyphicon-backward"></i></span></a></li>
        <li th:unless="${paginator.hasPrev}" class="disabled"><a>首页</a></li>
        <li th:unless="${paginator.hasPrev}" class="disabled"><a><span><i
                class="glyphicon glyphicon-backward"></i></span></a></li>
        <li th:each="pageItem : ${paginator.pages}" th:classappend="${pageItem.active} ? 'active'">
            <a th:href="${pageItem.url}" th:text="${pageItem.page}">1</a>
        </li>
        <li th:if="${paginator.hasNext}"><a th:href="${paginator.pageLinkNext}"><span><i
                class="glyphicon glyphicon-forward"></i></span></a></li>
        <li th:if="${paginator.hasNext}"><a th:href="${paginator.pageLinkLast}">尾页</a></li>
        <li th:unless="${paginator.hasNext}" class="disabled"><a><span><i
                class="glyphicon glyphicon-forward"></i></span></a></li>
        <li th:unless="${paginator.hasNext}" class="disabled"><a>尾页</a></li>
    </ul>
</th:block>
