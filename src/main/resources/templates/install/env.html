<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{install/layout :: head('MM-Wiki 安装-环境检测')}"></head>
<body style="padding-top: 50px; overflow-y: auto">
<div th:replace="~{install/layout :: nav}"></div>
<br>
<div class="container">
    <div class="row row-offcanvas row-offcanvas-right">
        <div class="col-xs-6 col-sm-3 sidebar-offcanvas">
            <div class="panel-body">
                <div th:replace="~{install/layout :: steps('env')}"></div>
            </div>
        </div>
        <div class="col-xs-12 col-sm-9">
            <div class="panel-body">
                <div class="panel panel-default">
                    <div class="panel-heading"><strong><i class="fa fa-server"></i> 服务器信息</strong></div>
                    <table class="table table-bordered">
                        <tbody>
                        <tr>
                            <td class="center w13p">IP</td>
                            <td class="center" th:text="${server.host}">127.0.0.1</td>
                        </tr>
                        <tr>
                            <td class="center">操作系统</td>
                            <td class="center" th:text="${server.sys}">Windows</td>
                        </tr>
                        <tr>
                            <td class="center">MM-Wiki 版本</td>
                            <td class="center"><span class="text text-success" th:text="${server.version}">v0.2.1</span>
                            </td>
                        </tr>
                        <tr>
                            <td class="center">安装目录</td>
                            <td class="center" th:text="${server.install_dir}">.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="panel panel-default">
                    <div class="panel-heading"><strong><i class="fa fa-check-circle"></i> 系统环境检测</strong></div>
                    <table class="table table-bordered">
                        <thead>
                        <tr>
                            <th class="w13p">参数</th>
                            <th>要求</th>
                            <th>值</th>
                            <th class="w11p">结果</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="env : ${envData}">
                            <td class="center" th:text="${env.name}">内存</td>
                            <td class="center" th:text="${env.require}">400M</td>
                            <td class="center" th:text="${env.value}">1024M</td>
                            <td class="center"><i
                                    th:class="${env.result == '1'} ? 'glyphicon glyphicon-ok text-success' : 'glyphicon glyphicon-remove text-danger'"></i>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="panel panel-default">
                    <div class="panel-heading"><strong><i class="fa fa-folder-open"></i> 目录文件检测</strong></div>
                    <table class="table table-bordered">
                        <thead>
                        <tr>
                            <th class="w30p">目录或文件</th>
                            <th>要求</th>
                            <th class="w11p">结果</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="dir : ${dirData}">
                            <td th:text="${dir.path}">path</td>
                            <td class="center" th:text="${dir.require}">存在</td>
                            <td class="center"><i
                                    th:class="${dir.result == '1'} ? 'glyphicon glyphicon-ok text-success' : 'glyphicon glyphicon-remove text-danger'"></i>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <form th:action="@{/install/env}" method="post">
                    <div class="col-md-offset-8 pull-right">
                        <a href="/install/license">
                            <button type="button" class="btn btn-warning">上一步</button>
                        </a>
                        <button type="button" onclick="Install.Submit(this.form, $(this))" class="btn btn-primary">
                            下一步
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{install/layout :: footer}"></div>
</body>
</html>
