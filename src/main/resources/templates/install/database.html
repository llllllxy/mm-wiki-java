<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{install/layout :: head('MM-Wiki 安装-数据库配置')}"></head>
<body style="padding-top: 50px; overflow-y: auto">
<div th:replace="~{install/layout :: nav}"></div>
<br>
<div class="container">
    <div class="row row-offcanvas row-offcanvas-right">
        <div class="col-xs-6 col-sm-3 sidebar-offcanvas">
            <div class="panel-body">
                <div th:replace="~{install/layout :: steps('database')}"></div>
            </div>
        </div>
        <div class="col-xs-12 col-sm-9">
            <div id="failedBox" style="margin-bottom: 0; margin-top: 10px;" class="hide"></div>
            <div class="panel-body">
                <div class="row">
                    <form class="form-horizontal" method="post" action="/install/database">
                        <div class="panel panel-default">
                            <div class="panel-heading"><strong><i class="fa fa-database"></i> 数据库配置</strong></div>
                            <div class="panel-body">
                                <ul class="nav nav-tabs" role="tablist">
                                    <li role="presentation" class="active"><a href="#mysql" aria-controls="mysql"
                                                                              role="tab" data-toggle="tab">MySQL</a>
                                    </li>
                                </ul>
                                <div class="tab-content">
                                    <br>
                                    <div role="tabpanel" class="tab-pane active" id="mysql">
                                        <div class="form-group">
                                            <label class="col-sm-2 control-label"><span class="text-danger"> * </span>
                                                MySQL Host </label>
                                            <div class="col-sm-4">
                                                <input type="text" name="host" class="form-control"
                                                       th:value="${databaseConf.host}" placeholder="请输入域名或 IP"
                                                       required>
                                            </div>
                                            <div class="col-sm-4" style="margin-top: 7px;">
                                                <span class="text-danger"> * 需自行安装 MySQL</span>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-2 control-label"><span class="text-danger"> * </span>
                                                MySQL 端口 </label>
                                            <div class="col-sm-4">
                                                <input type="text" name="port" class="form-control"
                                                       th:value="${databaseConf.port}" placeholder="请输入 MySQL 端口"
                                                       required>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-2 control-label"><span class="text-danger"> * </span>
                                                用户名 </label>
                                            <div class="col-sm-4">
                                                <input type="text" name="user" class="form-control"
                                                       th:value="${databaseConf.user}"
                                                       placeholder="请输入连接 MySQL 用户名" required>
                                            </div>
                                            <div class="col-sm-4" style="margin-top: 7px;">
                                                <span class="text-danger"> * 须具备建库、建表和写入权限</span>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-2 control-label"><span class="text-danger"> * </span>
                                                密码 </label>
                                            <div class="col-sm-4">
                                                <input type="text" name="pass" class="form-control"
                                                       th:value="${databaseConf.pass}"
                                                       placeholder="请输入连接 MySQL 密码" required>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-2 control-label"><span class="text-danger"> * </span>
                                                数据库名 </label>
                                            <div class="col-sm-4">
                                                <input type="text" name="name" class="form-control"
                                                       th:value="${databaseConf.name}" placeholder="请输入数据库名"
                                                       required>
                                            </div>
                                            <div class="col-sm-4" style="margin-top: 7px;">
                                                <span class="text-danger"> * 不存在会自动创建</span>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-2 control-label"><span class="text-danger"> * </span>
                                                最大空闲连接数 </label>
                                            <div class="col-sm-4">
                                                <input type="text" name="conn_max_idle" class="form-control"
                                                       th:value="${databaseConf.conn_max_idle}"
                                                       placeholder="请输入最大空闲连接数" required>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-2 control-label"><span class="text-danger"> * </span>
                                                最大连接数 </label>
                                            <div class="col-sm-4">
                                                <input type="text" name="conn_max_connection" class="form-control"
                                                       th:value="${databaseConf.conn_max_connection}"
                                                       placeholder="请输入最大连接数" required>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="panel-footer"></div>
                        </div>
                        <div class="panel panel-default">
                            <div class="panel-heading"><strong><i class="fa fa-user-circle-o"></i>
                                添加超级管理员</strong></div>
                            <div class="panel-body"></div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label"><span class="text-danger"> * </span> 用户名
                                </label>
                                <div class="col-sm-4">
                                    <input type="text" name="admin_name" class="form-control"
                                           th:value="${databaseConf.admin_name}" placeholder="请输入超级管理员用户名"
                                           required>
                                </div>
                                <div class="col-sm-6 form-comment">
                                    <span class="text-danger"> * MM-Wiki 系统的超级管理员，只能由数字和字母组成</span>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label"><span class="text-danger"> * </span> 密码 </label>
                                <div class="col-sm-4">
                                    <input type="text" name="admin_pass" class="form-control"
                                           th:value="${databaseConf.admin_pass}" placeholder="请输入超级管理员密码"
                                           required>
                                </div>
                            </div>
                            <div class="panel-footer"></div>
                        </div>
                        <div class="col-md-offset-8 pull-right">
                            <a href="/install/config">
                                <button type="button" class="btn btn-warning">上一步</button>
                            </a>
                            <button type="button" onclick="Install.Submit(this.form, $(this))" class="btn btn-primary">
                                下一步
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{install/layout :: footer}"></div>
</body>
</html>
