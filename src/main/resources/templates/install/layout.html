<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">MM-Wiki 安装向导</title>
    <link rel="stylesheet" type="text/css" th:href="@{/static/font-awesome/css/font-awesome.min.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/static/plugins/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/static/css/common.css}">
    <link rel="icon" th:href="@{/static/images/favicon.ico}">
    <script th:src="@{/static/plugins/jquery/jquery1.11.js}"></script>
    <script th:src="@{/static/plugins/bootstrap/js/bootstrap.min.js}"></script>
    <script th:src="@{/static/plugins/layer/layer.js}"></script>
    <script th:src="@{/static/plugins/cipher/sha256.js}"></script>
    <script th:src="@{/static/js/common/layers.js}"></script>
    <script th:src="@{/static/js/common/form.js}"></script>
    <script th:src="@{/static/js/common/common.js}"></script>
    <script th:src="@{/static/js/modules/install.js}"></script>
</head>
<body>
<div th:fragment="nav" class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <button class="navbar-toggle collapsed" type="button" data-toggle="collapse" data-target=".navbar-collapse">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand hidden-sm" href="/">MM-Wiki</a>
            <span class="navbar-brand" style="font-size: 16px"> 快速构建团队协作与知识分享平台</span>
        </div>
        <div class="navbar-collapse collapse" role="navigation">
            <ul class="nav navbar-nav navbar-right hidden-sm">
                <li class="dropdown">
                    <a id="helpLabel" type="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <span class="glyphicon glyphicon-question-sign"></span>&nbsp;&nbsp;帮助
                        <span class="caret"></span>
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="helpLabel" style="width: 100px">
                        <li><a href="https://github.com/phachon/mm-wiki/issues" target="_blank"><span
                                class="fa fa-question-circle"></span>&nbsp;问题反馈</a></li>
                        <li><a href="https://github.com/phachon/mm-wiki" target="_blank"><span
                                class="fa fa-book"></span>&nbsp;在线文档</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</div>
<div th:fragment="steps(active)" class="panel panel-default">
    <div class="panel-heading"><strong>安装步骤</strong></div>
    <div class="list-group">
        <a href="/install/license" class="list-group-item" th:classappend="${active == 'license'} ? ' active'"><i
                class="glyphicon glyphicon-hand-right"></i> 1. 许可协议</a>
        <a href="/install/env" class="list-group-item" th:classappend="${active == 'env'} ? ' active'"><i
                class="glyphicon glyphicon-hand-right"></i> 2. 环境检测</a>
        <a href="/install/config" class="list-group-item" th:classappend="${active == 'config'} ? ' active'"><i
                class="glyphicon glyphicon-hand-right"></i> 3. 系统配置</a>
        <a href="/install/database" class="list-group-item" th:classappend="${active == 'database'} ? ' active'"><i
                class="glyphicon glyphicon-hand-right"></i> 4. 数据库配置</a>
        <a href="/install/ready" class="list-group-item" th:classappend="${active == 'ready'} ? ' active'"><i
                class="glyphicon glyphicon-hand-right"></i> 5. 准备安装</a>
        <a href="#" class="list-group-item" th:classappend="${active == 'end'} ? ' active'"><i
                class="glyphicon glyphicon-hand-right"></i> 6. 安装完成</a>
    </div>
    <div class="panel-footer"></div>
</div>
<footer th:fragment="footer" class="container">
    <hr>
    <p>&copy; <span th:text="${copyright}">2026 tinycloud</span></p>
</footer>
</body>
</html>
